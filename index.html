    @keyframes fade-in-out {
      0% { opacity: 0; transform: translate(-50%, -20px); }
      10% { opacity: 1; transform: translate(-50%, 0); }
      90% { opacity: 1; transform: translate(-50%, 0); }
      100% { opacity: 0; transform: translate(-50%, -20px); }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
    }

    // --- ユーティリティ関数 ---
    const getNextExp = (level) => Math.floor(20 * Math.pow(1.6, level - 1));

    const generateRandomEquip = (currentDay, type, optimalWeight) => {
      const maxRecipeLevel = Math.max(1, Math.min(15, Math.ceil(currentDay / 8)));
      const validRecipes = RECIPES.filter(r => r.type === type && r.weight === optimalWeight && r.reqLevel <= maxRecipeLevel);
      if (validRecipes.length === 0) return null;

      const recipe = validRecipes[Math.floor(Math.random() * validRecipes.length + (validRecipes.length / 2)) % validRecipes.length];
      return {
        uid: Date.now().toString() + Math.random().toString(36).substr(2, 5),
        recipeId: recipe.id, name: `普通の${recipe.name}`, quality: 'ノーマル',
        enchant: null, power: recipe.basePower, baseValue: recipe.baseValue,
        weight: recipe.weight, category: recipe.category, series: recipe.series, type: recipe.type, 
        durability: recipe.durability, maxDurability: recipe.durability
      };
    };

    const generateAdventurer = (currentDay, guildLvl) => {
      const name = ADVENTURER_NAMES[Math.floor(Math.random() * ADVENTURER_NAMES.length)];
      let baseClasses = ['戦士', '剣士', '僧侶', '盗賊', '魔法使い'];
      
      let advClass = baseClasses[Math.floor(Math.random() * baseClasses.length)];
      if (currentDay > 20 && Math.random() < Math.min(0.8, currentDay / 100)) {
        advClass = CLASS_DATA[advClass].advanced || advClass;
      }
      
      const guildBonus = (guildLvl - 1) * 15; 
      const basePower = Math.floor(Math.random() * 10) + 10 + Math.floor(currentDay * 1.5) + guildBonus;
      const money = 200 + Math.floor(Math.random() * 200) + (currentDay * 30);
      const optWeight = CLASS_DATA[advClass].weight;
      
      let initWeapon = null; let initArmor = null; let initShield = null;
      if (currentDay > 5 && Math.random() < 0.6) initWeapon = generateRandomEquip(currentDay, 'weapon', optWeight);
      if (currentDay > 10 && Math.random() < 0.5) initArmor = generateRandomEquip(currentDay, 'armor', optWeight);
      if (currentDay > 15 && Math.random() < 0.4) initShield = generateRandomEquip(currentDay, 'shield', optWeight);

      return {
        id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
        name: name, class: advClass, baseClass: advClass, basePower: basePower,
        money: money, trust: 20 + Math.floor(Math.random() * 20), isDead: false,
        equips: { weapon: initWeapon, armor: initArmor, shield: initShield }, aliveDays: 0,
        flavor: FLAVOR_TEXTS[Math.floor(Math.random() * FLAVOR_TEXTS.length)]
      };
    };

    const generateQuest = (currentCraftLvl) => {
      const availableRecipes = RECIPES.filter(r => r.reqLevel <= currentCraftLvl + 1);
      const targetRecipe = availableRecipes[Math.floor(Math.random() * availableRecipes.length)] || RECIPES[0];
      const bonusMats = ['magic_stone', 'steel', 'fine_wood', 'hard_leather', 'mithril', 'dragon_scale'];
      const rewardMatId = bonusMats[Math.floor(Math.random() * Math.min(bonusMats.length, Math.ceil(currentCraftLvl/2)))];
      return {
        id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
        targetRecipeId: targetRecipe.id, targetName: targetRecipe.name,
        rewardMoney: Math.floor(targetRecipe.baseValue * 3.0),
        rewardMat: rewardMatId,
        rewardMatAmt: Math.floor(Math.random() * 3) + 1
      };
    };

    const calcTax = (day) => Math.floor(300 * Math.pow(1.5, Math.ceil(day / 10) - 1));

    // 職業ごとの得意武器ボーナスを含めた計算
    const calcEquipPower = (advClass, item) => {
      if (!item) return { base: 0, final: 0, isOptimalWeight: false, isFavored: false };
      let pwr = item.durability <= 0 ? Math.floor(item.power * 0.1) : item.power;
      
      const classInfo = CLASS_DATA[advClass];
      const isOptimalWeight = item.weight === classInfo.weight;
      const isFavored = classInfo.fav && classInfo.fav.includes(item.category);
      
      if (!isOptimalWeight) pwr = Math.floor(pwr * 0.5);
      if (isFavored) pwr = Math.floor(pwr * 1.3); 
      
      return { base: item.power, final: pwr, isOptimalWeight, isFavored };
    };

    const getSeriesBonus = (equips) => {
      const seriesCount = {};
      ['weapon', 'armor', 'shield'].forEach(s => {
        if (equips[s] && equips[s].durability > 0) seriesCount[equips[s].series] = (seriesCount[equips[s].series] || 0) + 1;
      });
      let activeSeries = null, multiplier = 1.0, count = 0;
      for (const [series, c] of Object.entries(seriesCount)) {
        if (c >= 2) { activeSeries = series; count = c; multiplier = c === 3 ? 1.25 : 1.1; break; }
      }
      return { activeSeries, multiplier, count };
    };

    const calcTotalPowerInfo = (adv) => {
      const w = calcEquipPower(adv.class, adv.equips.weapon);
      const a = calcEquipPower(adv.class, adv.equips.armor);
      const s = calcEquipPower(adv.class, adv.equips.shield);
      const baseEquipTotal = w.final + a.final + s.final;

      const bonusInfo = getSeriesBonus(adv.equips);
      const finalEquipPower = Math.floor(baseEquipTotal * bonusInfo.multiplier);
      
      return {
        total: adv.basePower + finalEquipPower,
        bonusInfo,
        details: { weapon: w, armor: a, shield: s }
      };
    };

      return "無事に帰還したよ。次はもっと奥へ行くつもりだ。";
    };

    const deepCopy = (obj) => JSON.parse(JSON.stringify(obj));

    // --- アイコン ---
    const IconSword = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="14.5" y1="20.5" x2="3.5" y2="9.5"></line><polyline points="14.5 12.5 14.5 20.5 22.5 20.5"></polyline><line x1="9.5" y1="14.5" x2="5.5" y2="18.5"></line></svg>;

    // --- 子コンポーネント ---

    const QuestCard = ({ quest, inventory, onAbandon, onComplete }) => {
      const availableItems = inventory.filter(i => i.recipeId === quest.targetRecipeId);
      const [selectedUid, setSelectedUid] = useState('');

      useEffect(() => {
        if (availableItems.length > 0 && !availableItems.find(i => i.uid === selectedUid)) {
          setSelectedUid(availableItems[0].uid);
        } else if (availableItems.length === 0) {
          setSelectedUid('');
        }
      }, [inventory, availableItems, selectedUid]);

      return (

    // --- メインアプリケーション ---
    function App() {
      const [gameState, setGameState] = useState('menu');

      const [inventory, setInventory] = useState([]);
      
      const [guildLevel, setGuildLevel] = useState(1);
      const [adventurers, setAdventurers] = useState(() => [generateAdventurer(1, 1), generateAdventurer(1, 1), generateAdventurer(1, 1)]);

      const [craftLevel, setCraftLevel] = useState(1);
      const [craftExp, setCraftExp] = useState(0);
      const [upgrades, setUpgrades] = useState({ forgeLevel: 0, haggleLevel: 0, shopLevel: 0 });
      const [stats, setStats] = useState({ crafted: 0, epicCrafted: 0, totalSales: 0 }); 
      const [achievements, setAchievements] = useState(() => INITIAL_ACHIEVEMENTS.map(a => ({ ...a })));

      const [quests, setQuests] = useState([generateQuest(1), generateQuest(1), generateQuest(1)]);
      const [vipQuest, setVipQuest] = useState({ active: false, completed: false });
      
      const [dailyEvent, setDailyEvent] = useState(null); 
      const [activeEvent, setActiveEvent] = useState(null); 
      const [endingId, setEndingId] = useState(null);
      const [hasSaveData, setHasSaveData] = useState(false);
      const [selectedAdvInfo, setSelectedAdvInfo] = useState(null); 
      const [shopSelectedItem, setShopSelectedItem] = useState(null);
      const [shopPricePct, setShopPricePct] = useState(100);
      const [showDeadAdvs, setShowDeadAdvs] = useState(false); 

      // タブフィルター用
      const [craftFilter, setCraftFilter] = useState('all'); 
      const [shopFilter, setShopFilter] = useState('all');

      // ボス戦結果
      const [bossReport, setBossReport] = useState(null);

      const [confirmLoad, setConfirmLoad] = useState(false);
      const [confirmClear, setConfirmClear] = useState(false);
      const [confirmReset, setConfirmReset] = useState(false);

      const [toast, setToast] = useState({ visible: false, message: '', type: 'info' });
      const [isTransitioning, setIsTransitioning] = useState(false);
      const [transitionText, setTransitionText] = useState("");

      const logsEndRef = useRef(null);
      const toastTimerRef = useRef(null);

      useEffect(() => {
        try {
          const saved = localStorage.getItem('blacksmith_save_v11');
          if (saved) setHasSaveData(true);
        } catch (e) {}
      }, []);

      useEffect(() => {
        if (gameState === 'log' && logsEndRef.current) logsEndRef.current.scrollIntoView({ behavior: "smooth" });
      }, [logs, gameState]);

      useEffect(() => { setShopPricePct(100); }, [shopSelectedItem]);

      const showToast = (message, type = 'info') => {
        setToast({ visible: true, message, type });
        if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
        toastTimerRef.current = setTimeout(() => { setToast(prev => ({ ...prev, visible: false })); }, 3000);
      };

      const addLog = (msg) => {
        setLogs(prev => {
          const lastLog = prev[prev.length - 1];
          const prefix = `[Day ${day}] `;
          if (lastLog) {
            const lastMsgMatch = lastLog.match(/\[Day \d+\] (.*?)(?:\s+\(x\d+\))?$/);
            if (lastMsgMatch && lastMsgMatch[1] === msg) {
              const countMatch = lastLog.match(/\(x(\d+)\)$/);
              const count = countMatch ? parseInt(countMatch[1]) + 1 : 2;
              return [...prev.slice(0, -1), `${prefix}${msg} (x${count})`];
            }
          }
          return [...prev, `${prefix}${msg}`];
        });
      };

      useEffect(() => {
        setAchievements(prev => {
          let updated = false;
          const newAchievements = prev.map(ach => {
            if (!ach.claimed && !ach.unlocked && ach.condition({ stats, fame, adventurers, day })) {
              updated = true;
              return { ...ach, unlocked: true }; 
            }
            return ach;
          });
          if (updated) {
            showToast('🏆 新しい実績を達成しました！', 'success');
            return newAchievements;
          }
          return prev;
        });
      }, [stats, fame, adventurers, day]);

        const ach = achievements.find(a => a.id === achId);
        if (!ach || ach.claimed) return;
        
        const tempState = { money, materials: { ...materials } };
        ach.onClaim(tempState); 
        setMoney(tempState.money);
        setMaterials(tempState.materials);

        setAchievements(prev => prev.map(a => a.id === achId ? { ...a, claimed: true, unlocked: false } : a));

          localStorage.setItem('blacksmith_save_v11', JSON.stringify(data));

              setDay(data.day); setMoney(data.money); setFame(data.fame || 0);
              setMaterials(data.materials); setInventory(data.inventory); setAdventurers(data.adventurers);

              setUpgrades(data.upgrades); setCraftLevel(data.craftLevel || 1); setCraftExp(data.craftExp || 0);
              setGuildLevel(data.guildLevel || 1); setVipQuest(data.vipQuest || { active: false, completed: false });
              setActiveEvent(data.activeEvent || null);
              setStats(data.stats || { crafted: 0, epicCrafted: 0, totalSales: 0 });
              setAchievements(INITIAL_ACHIEVEMENTS.map(baseAch => {
                const savedAch = (data.achievements || []).find(a => a.id === baseAch.id);
                return { ...baseAch, ...(savedAch || {}) };
              }));
              setQuests(data.quests || [generateQuest(1), generateQuest(1), generateQuest(1)]);
              setGameState('menu'); showToast('ロードに成功しました', 'success');
            }
          } catch (e) { showToast('ロードに失敗しました', 'error'); }
          setConfirmLoad(false);
        } else {
          setConfirmLoad(true); setTimeout(() => setConfirmLoad(false), 3000);
        }
      };

      const clearSave = () => {
        if (confirmClear) {
          try { localStorage.removeItem('blacksmith_save_v11'); setHasSaveData(false); showToast('セーブデータを消去しました', 'info'); } catch (e) { }
          setConfirmClear(false);
        } else {
          setConfirmClear(true); setTimeout(() => setConfirmClear(false), 3000);
        }
      };

      const resetGame = () => {
        if (confirmReset) {
          setGameState('menu'); setDay(1); setMoney(1500); setFame(0);
          setMaterials({ iron: 40, wood: 40, leather: 30, steel: 0, fine_wood: 0, hard_leather: 0, mithril: 0, dragon_scale: 0, magic_stone: 0, high_magic_stone: 0, orichalcum: 0, adamantite: 0, god_tear: 0 });
          setInventory([]); setGuildLevel(1); setAdventurers([generateAdventurer(1, 1), generateAdventurer(1, 1), generateAdventurer(1, 1)]);
          setLogs(["【開店】親方から譲り受けた小さな工房。今日からここが俺の城だ。"]);
          setCraftLevel(1); setCraftExp(0); setUpgrades({ forgeLevel: 0, haggleLevel: 0, shopLevel: 0 });
          setStats({ crafted: 0, epicCrafted: 0, totalSales: 0 }); setAchievements(INITIAL_ACHIEVEMENTS.map(a => ({ ...a })));
          setQuests([generateQuest(1), generateQuest(1), generateQuest(1)]); setVipQuest({ active: false, completed: false });
          setActiveEvent(null); setEndingId(null); setBossReport(null); setConfirmReset(false);
        } else {
          setConfirmReset(true); setTimeout(() => setConfirmReset(false), 3000);
        }
      };

      const getDungeonDifficulty = (currentDay) => {
        let diff = Math.floor(currentDay * 8 + 15 + (currentDay > 50 ? (currentDay - 50) * 5 : 0)); 
        if (activeEvent) diff += activeEvent.diffMod;
        return diff;
      };

      const gainExp = (amount) => {
        let currentExp = craftExp + amount;
        let currentLvl = craftLevel;
        let leveledUp = false;
        while (currentExp >= getNextExp(currentLvl) && currentLvl < 15) { 
          currentExp -= getNextExp(currentLvl);
          currentLvl++; leveledUp = true;
        }
        setCraftExp(currentExp);
        if (leveledUp) {
          setCraftLevel(currentLvl);
          addLog(`🎉【成長】職人としての腕前が上がり、工房レベルが ${currentLvl} になった！`);
        }
      };

      const handleCraft = (recipe) => {
        for (const [matId, reqAmt] of Object.entries(recipe.req)) {
          if ((materials[matId] || 0) < reqAmt) {
            showToast(`${recipe.name}を作る素材が足りません！`, 'error'); return;
          }
        }

        const newMaterials = { ...materials };
        for (const [matId, reqAmt] of Object.entries(recipe.req)) { newMaterials[matId] -= reqAmt; }
        setMaterials(newMaterials);

        let qualityRoll = Math.random() * 100 + (upgrades.forgeLevel * 10);
        if (vipQuest.completed) qualityRoll += 50; 

        let qualityStr = "ノーマル"; let qMultiplier = 1.0;
        if (qualityRoll > 95) { qualityStr = "エピック"; qMultiplier = 1.6; }
        else if (qualityRoll > 70) { qualityStr = "レア"; qMultiplier = 1.3; }
        else if (qualityRoll < 5) { qualityStr = "粗悪"; qMultiplier = 0.7; }

        let appliedEnchant = null;
        if (vipQuest.completed && Math.random() * 100 < 30) {
          appliedEnchant = ENCHANTS.find(e => e.id === 'divine');
        } else {
          const enchantChance = 10 + (upgrades.forgeLevel * 5) + (qualityStr === 'エピック' ? 30 : 0) + (vipQuest.completed ? 30 : 0);
          if (Math.random() * 100 < enchantChance) {
            const normalEnchants = ENCHANTS.filter(e => e.weight > 0);
            const totalWeight = normalEnchants.reduce((sum, e) => sum + e.weight, 0);
            let rand = Math.random() * totalWeight;
            for (const e of normalEnchants) { rand -= e.weight; if (rand <= 0) { appliedEnchant = e; break; } }
          }
        }

        const finalPower = Math.floor(recipe.basePower * qMultiplier * (appliedEnchant ? appliedEnchant.powerMult : 1));
        const finalValue = Math.floor(recipe.baseValue * qMultiplier * (appliedEnchant ? appliedEnchant.valueMult : 1));
        const fullName = appliedEnchant ? `[${appliedEnchant.name}] ${recipe.name}` : recipe.name;

        const newItem = {
          uid: Date.now().toString() + Math.random().toString(36).substr(2, 5),
          recipeId: recipe.id, name: `${qualityStr}な${fullName}`, quality: qualityStr,
          enchant: appliedEnchant ? appliedEnchant.name : null, power: finalPower, baseValue: finalValue,
          weight: recipe.weight, category: recipe.category, series: recipe.series, type: recipe.type, durability: recipe.durability, maxDurability: recipe.durability
        };

        setInventory([...inventory, newItem]);
        setStats(s => ({ ...s, crafted: s.crafted + 1, epicCrafted: qualityStr === 'エピック' ? s.epicCrafted + 1 : s.epicCrafted }));
        
        if (appliedEnchant && appliedEnchant.id === 'divine') { addLog(`🔆【神業】神々しい光を放つ ${newItem.name} が誕生した...!!`); showToast(`神業！ ${newItem.name} が完成しました`, 'success'); }
        else if (appliedEnchant || qualityStr === "エピック") { addLog(`✨【名作誕生】炉の炎が青く輝き、${newItem.name}が打ち上がった！`); showToast(`大成功！ ${newItem.name} が完成`, 'success'); }
        else if (qualityStr === "粗悪") { addLog(`【製作】少し叩き損ねたが、${newItem.name}が完成した。`); showToast(`${newItem.name} が完成(品質:低)`, 'info'); }
        else { addLog(`【製作】汗を流し、${newItem.name}を打ち上げた。`); showToast(`${newItem.name} が完成`, 'success'); }

        gainExp(Math.max(5, Math.floor(recipe.baseValue / 4)));
      };

      const handleSell = (item, advId, pricePercentage) => {
        const advIndex = adventurers.findIndex(a => a.id === advId);
        if (advIndex === -1) return;
        const adv = adventurers[advIndex];
        const askPrice = Math.floor(item.baseValue * (pricePercentage / 100));
        const effectiveMoney = adv.money * (1 + (upgrades.haggleLevel * 0.1)) * (1 + (adv.trust / 100));

        if (effectiveMoney < askPrice) {
          showToast(`${adv.name} は予算オーバーです`, 'error');
          addLog(`【交渉決裂】${adv.name}「ぼったくりだ！そんな金は払えないよ」と怒ってしまった。`);
          const newAdvs = [...adventurers]; newAdvs[advIndex].trust = Math.max(0, adv.trust - 5); setAdventurers(newAdvs);
          return;
        }

        setMoney(m => m + askPrice);
        setInventory(inv => inv.filter(i => i.uid !== item.uid));
        setStats(s => ({ ...s, totalSales: s.totalSales + askPrice }));
        setShopSelectedItem(null); setShopPricePct(100);
        showToast(`${item.name} を売却！ (+${askPrice}G)`, 'success');
        
        let trustChange = pricePercentage <= 80 ? 5 : pricePercentage <= 110 ? 1 : -5;
        if (item.weight === CLASS_DATA[adv.class].weight) trustChange += 2; else trustChange -= 2;

        const newAdvs = [...adventurers];
        newAdvs[advIndex].money = Math.max(0, adv.money - askPrice);
        newAdvs[advIndex].trust = Math.min(100, newAdvs[advIndex].trust + trustChange);
        newAdvs[advIndex].equips = { ...newAdvs[advIndex].equips, [item.type]: item };

        setAdventurers(newAdvs);
        if (item.weight !== CLASS_DATA[adv.class].weight) addLog(`【売却】${adv.name}に ${askPrice}G で売れたが、「重さが合わないな…」と渋い顔をしていた。`);
        else addLog(`【売却】${adv.name}は「これは良い品だ！」と喜び、${askPrice}G を支払っていった。`);
      };

      const handleRepair = (advId, slot) => {
        const advIndex = adventurers.findIndex(a => a.id === advId);
        if (advIndex === -1) return;
        const adv = adventurers[advIndex];
        const item = adv.equips[slot];
        if (!item || item.durability >= item.maxDurability) return;

        const repairCost = Math.max(1, Math.floor((item.maxDurability - item.durability) * (item.baseValue / 20)));
        const effectiveMoney = adv.money * (1 + (upgrades.haggleLevel * 0.1)) * (1 + (adv.trust / 100));

        if (effectiveMoney < repairCost) {
          showToast(`${adv.name} は修理代を持っていません`, 'error');
          addLog(`【交渉】${adv.name}「修理したいが、金が足りない…」`);
          return;
        }

        setMoney(m => m + repairCost);
        const newAdvs = [...adventurers];
        newAdvs[advIndex].money = Math.max(0, adv.money - repairCost);
        newAdvs[advIndex].trust = Math.min(100, adv.trust + 2); 
        newAdvs[advIndex].equips[slot].durability = item.maxDurability;

        setAdventurers(newAdvs);
        showToast(`装備を修理しました (+${repairCost}G)`, 'success');
        addLog(`【修理】${adv.name}の ${item.name} を修理し、${repairCost}G を得た。`);
      };

      const handleMarketSell = (item) => {
        const sellPrice = Math.floor(item.baseValue * 0.8); 
        let fameGained = Math.floor(item.baseValue / 40) + (item.quality === 'レア' ? 2 : item.quality === 'エピック' ? 6 : 0) + (item.enchant ? 4 : 0);
        fameGained = Math.max(1, fameGained); 

        const oldLevel = FAME_THRESHOLDS.filter(t => fame >= t).length;
        setMoney(m => m + sellPrice); setFame(f => f + fameGained);
        setInventory(inv => inv.filter(i => i.uid !== item.uid));
        setStats(s => ({ ...s, totalSales: s.totalSales + sellPrice }));
        setShopSelectedItem(null); setShopPricePct(100);

        showToast(`市場卸し: +${sellPrice}G / ⭐+${fameGained}`, 'success');
        addLog(`💰【市場卸し】${item.name} を市場へ流した。${sellPrice}G の利益と、名声 ${fameGained} を得た！`);

        if (FAME_THRESHOLDS.filter(t => (fame + fameGained) >= t).length > oldLevel) {
            const newAdv = generateAdventurer(day, guildLevel);
            setAdventurers(prev => [...prev, newAdv]);
            addLog(`🌟【名声】市場に出回った武具の噂を聞きつけ、新たな冒険者 ${newAdv.name} (${newAdv.class}) が店を訪れた！`);
            showToast(`名声により新たな冒険者が来店！`, 'info');
        }
      };

      const handleBuyMaterial = (matId, amount, cost) => {
        if (money < cost) { showToast(`資金が足りません！`, 'error'); return; }
        setMoney(m => m - cost); setMaterials(prev => ({ ...prev, [matId]: prev[matId] + amount }));
        showToast(`${MATERIALS[matId].name} を仕入れました`, 'success');
        addLog(`📦【仕入】問屋から ${MATERIALS[matId].name} を ${amount}個買い付けた。`);
      };

      const handleUpgrade = (type, cost) => {
        if (money < cost) { showToast(`資金が足りません！`, 'error'); return; }
        setMoney(m => m - cost); setUpgrades(prev => ({ ...prev, [type]: prev[type] + 1 }));
        showToast(`設備を拡張しました！`, 'success');
        addLog(`【設備投資】職人を呼び、工房の設備を拡張した。`);
      };

      const handleGuildInvest = () => {
        const cost = 1000 * guildLevel;
        if (money >= cost) {
          setMoney(m => m - cost); setGuildLevel(l => l + 1);
          showToast(`ギルドへ投資しました！`, 'success');
          addLog(`🤝【ギルド投資】ギルドに ${cost}G 寄付した。新人冒険者の質が上がるだろう。`);
        } else { showToast(`資金が足りません！`, 'error'); }
      };

      const completeQuest = (quest, itemUid) => {
        setInventory(inv => inv.filter(i => i.uid !== itemUid));
        setMoney(m => m + quest.rewardMoney);
        setMaterials(mats => ({ ...mats, [quest.rewardMat]: (mats[quest.rewardMat] || 0) + quest.rewardMatAmt }));
        setStats(s => ({ ...s, totalSales: s.totalSales + quest.rewardMoney }));
        showToast(`依頼を達成しました！`, 'success');
        addLog(`【ギルド納品】依頼の品を納め、金貨 ${quest.rewardMoney}G と素材を受け取った。`);
        setQuests(prev => prev.map(q => q.id === quest.id ? generateQuest(craftLevel) : q));
      };

      const abandonQuest = (questId) => {
        setQuests(prev => prev.map(q => q.id === questId ? generateQuest(craftLevel) : q));
        showToast(`依頼を破棄しました`, 'info');
        addLog(`【ギルド】手に負えない依頼を破棄した。`);
      };

      const handleVipQuestComplete = () => {
        const targetItem = inventory.find(i => i.recipeId === 'mithril_sword' && (i.quality === 'エピック' || i.enchant === '神がかりの'));
        if (!targetItem) return;

        setInventory(inv => inv.filter(i => i.uid !== targetItem.uid));
        setMoney(m => m + 50000);
        setVipQuest(prev => ({ ...prev, active: false, completed: true }));
        showToast(`王室の特命を果たしました！`, 'success');
        addLog(`👑【王室御用達】特命を見事果たした！報酬50,000Gに加え、王家より「伝説の炉」が下賜された！`);
      };

      const triggerDailyEvent = () => {
        const events = [
          {
            title: "怪しい行商人",
            desc: "「ヘッヘッヘ…旦那、良いモン入ってまっせ。500Gでどうだい？」",
            choices: [
              { text: "箱を買う (500G)", onSelect: () => {
                  if (money >= 500) {
                    setMoney(m => m - 500);
                    if (Math.random() > 0.5) {
                      setMaterials(m => ({ ...m, magic_stone: m.magic_stone + 3 }));
                      addLog("🎁【イベント】箱の中身は『魔石x3』だった！良い買い物だ。");
                    } else {
                      setMaterials(m => ({ ...m, wood: m.wood + 1 }));
                      addLog("🎁【イベント】箱の中身は『木材x1』だった…騙された！");
                    }
                  } else { addLog("🎁【イベント】金が足りず商人は去っていった。"); }
                } 
              },
              { text: "追い払う", onSelect: () => { addLog("🎁【イベント】怪しい商人を追い払った。"); } }
            ]
          },
          {
            title: "冒険者からの頼み",
            desc: "駆け出しの冒険者が頭を下げている。「どうしても防具が必要なんです！200G、貸してくれませんか？」",
            choices: [
              { text: "金を貸す (200G)", onSelect: () => {
                  if (money >= 200) {
                    setMoney(m => m - 200); setFame(f => f + 15);
                    addLog("🤝【イベント】若者に200G貸してやった。街での評判（名声+15）が少し上がったようだ。");
                  } else { addLog("🤝【イベント】金がなく、申し出を断った。"); }
                }
              },
              { text: "断る", onSelect: () => { addLog("🤝【イベント】うちは金貸しじゃない、と断った。"); } }
            ]
          },
          {
            title: "鍛冶の閃き",
            desc: "夜中にふと、新しい製法のアイデアが浮かんできた。徹夜で研究すれば形になるかもしれないが…",
            choices: [
              { text: "徹夜で研究する", onSelect: () => {
                  gainExp(50);
                  addLog("💡【イベント】徹夜の研究が実を結び、大きな経験値を得た！（EXP+50）");
                }
              },
              { text: "しっかり寝る", onSelect: () => { addLog("💡【イベント】無理は禁物だ。布団に入った。"); } }
            ]
          }
        ];
        
        if (Math.random() < 0.25) { 
          setDailyEvent(events[Math.floor(Math.random() * events.length)]);
        }
      };

      const handleEventResolve = (action) => { action(); setDailyEvent(null); };

      const advanceDay = () => {
        if (isTransitioning) return; 
        setBossReport(null);
        setTransitionText(`Day ${day} 終了...`);
        setIsTransitioning(true);

        setTimeout(() => {
          addLog(`--- 探索フェーズ（夜明け） ---`);
          let earnedMaterials = { ...materials };
          let newAdvs = [...adventurers];
          let activeAdvsCount = 0;
          let reportLogs = []; 

          // ボス襲来判定 (10日ごと)
          const targetBoss = BOSSES.find(b => b.day === day);
          if (targetBoss) {
            const aliveAdvs = newAdvs.filter(a => !a.isDead);
            const totalTownPower = aliveAdvs.reduce((sum, adv) => sum + calcTotalPowerInfo(adv).total, 0);
            
            addLog(`💀【ボス襲来】${targetBoss.name} が街に迫る！ 街の総戦力:${totalTownPower} vs ボス:${targetBoss.power}`);
            
            if (totalTownPower >= targetBoss.power) {
              // ボス撃破
              let earnedMatsStr = [];
              for(const [matId, amt] of Object.entries(targetBoss.rewardMats)) {
                earnedMaterials[matId] = (earnedMaterials[matId] || 0) + amt;
                earnedMatsStr.push(`${MATERIALS[matId].name}x${amt}`);
              }
              setMoney(m => m + targetBoss.rewardMoney);
              setFame(f => f + 100);
              addLog(`🎉【ボス討伐】冒険者たちは協力し、${targetBoss.name}を討ち果たした！`);
              addLog(`🎁【特別報酬】${targetBoss.rewardMoney}G と ${earnedMatsStr.join(', ')} を得た！`);
              setBossReport({ success: true, boss: targetBoss, money: targetBoss.rewardMoney, mats: earnedMatsStr.join(', ') });
            } else {
              // ボス敗北
              addLog(`🔥【防衛失敗】冒険者たちは敗走し、街は大きな被害を受けた...`);
              newAdvs.forEach(adv => {
                if (!adv.isDead) {
                  adv.trust = Math.max(0, adv.trust - 30);
                  ['weapon', 'armor', 'shield'].forEach(slot => { if(adv.equips[slot]) adv.equips[slot].durability = 0; });
                }
              });
              setBossReport({ success: false, boss: targetBoss });
            }
          }

          let activeEnvEvent = null;
          if (!targetBoss && Math.random() * 100 < 20) {
            activeEnvEvent = RANDOM_EVENTS[Math.floor(Math.random() * RANDOM_EVENTS.length)];
            setActiveEvent(activeEnvEvent);
            addLog(`📢【噂話】街で噂が流れている...「${activeEnvEvent.name}」`);
          } else { setActiveEvent(null); }

          const diffScore = getDungeonDifficulty(day);
          const rewardMod = activeEnvEvent ? activeEnvEvent.rewardMod : 1.0;
          const buyMod = activeEnvEvent ? activeEnvEvent.buyPriceMod : 1.0;

          // 通常探索処理
          if (!targetBoss) {
            newAdvs.forEach(adv => {
              if (adv.isDead) return;
              activeAdvsCount++; adv.aliveDays += 1;

              if (adv.trust >= 80 && adv.aliveDays >= 10 && calcTotalPowerInfo(adv).total >= 100 && CLASS_DATA[adv.class].advanced) {
                const oldClass = adv.class;
                adv.class = CLASS_DATA[adv.class].advanced;
                adv.basePower += 50; 
                addLog(`✨【覚醒】${adv.name}が「${adv.class}」となった！`); 
              }

              const totalPower = calcTotalPowerInfo(adv).total;
              let survivalRate = Math.max(5, Math.min(95, 40 + (totalPower - diffScore) * 1.5 + (upgrades.shopLevel * 5)));
              
              if (Math.random() * 100 > survivalRate) {
                adv.isDead = true;
                addLog(`🩸【悲劇】${adv.name}は帰還しなかった...`);
                reportLogs.push({ name: adv.name, class: adv.class, isDead: true, speech: getReportSpeech(adv, 0) });
              } else {
                const rewardMoney = Math.floor((Math.random() * 100 + day * 15) * (1 + upgrades.haggleLevel * 0.2) * rewardMod);
                adv.money += rewardMoney;

                ['weapon', 'armor', 'shield'].forEach(slot => { if (adv.equips[slot] && adv.equips[slot].durability > 0) adv.equips[slot].durability -= 1; });

                let totalBuyPrice = 0; let droppedMatsStr = [];
                const numDrops = Math.floor(Math.random() * 3) + 1; 

                for (let i = 0; i < numDrops; i++) {
                  let dropRarity = 1;
                  if (Math.random() * 100 < adv.trust + (day / 2)) dropRarity = 2;
                  if (Math.random() * 100 < adv.trust / 2 + (day / 4) || ['アサシン', '剣聖'].includes(adv.class)) dropRarity = 3;

                  const possibleMats = Object.values(MATERIALS).filter(m => m.rarity <= dropRarity);
                  const dropMat = possibleMats[Math.floor(Math.random() * possibleMats.length)];
                  const dropAmt = Math.floor(Math.random() * 4) + 2 + Math.floor(day / 20); 

                  const discount = (upgrades.haggleLevel * 0.1) + (adv.trust / 200);
                  const buyPrice = Math.floor(dropMat.basePrice * dropAmt * Math.max(0.3, (1.2 - discount)) * buyMod);
                  
                  if (money >= totalBuyPrice + buyPrice && Math.random() * 100 < (adv.trust + 50)) { 
                     totalBuyPrice += buyPrice; earnedMaterials[dropMat.id] = (earnedMaterials[dropMat.id] || 0) + dropAmt;
                     droppedMatsStr.push(`${dropMat.name}x${dropAmt}`);
                  }
                }
                if (droppedMatsStr.length > 0) {
                   setMoney(m => m - totalBuyPrice);
                   addLog(`【買取】${adv.name}から ${droppedMatsStr.join(', ')} を計 ${totalBuyPrice}G で買い取った。`);
                } else { addLog(`【生還】${adv.name}が無事帰還し ${rewardMoney}G を得た。`); }

                reportLogs.push({ name: adv.name, class: adv.class, isDead: false, speech: getReportSpeech(adv, rewardMoney) });
              }
            });
          } else {
             // ボス戦の日は通常レポートはスキップ
             newAdvs.forEach(adv => { if (!adv.isDead) activeAdvsCount++; });
          }

          // 冒険者の補充
          if (day % 5 === 0 || activeAdvsCount < 3) {
             const newAdv = generateAdventurer(day, guildLevel); newAdvs.push(newAdv);
             addLog(`🌟【新規来店】新しい冒険者 ${newAdv.name} (${newAdv.class}) が店を訪れた。`);
          }

          setMaterials(earnedMaterials); setAdventurers(newAdvs); setShopSelectedItem(null); setShopPricePct(100);
          
          let nextMoney = money;
          if (day % 10 === 0) {
            const tax = calcTax(day); nextMoney -= tax;
            addLog(`📜【納税】徴税吏に店舗税 ${tax} G を納めた。`); setMoney(nextMoney);
            if (nextMoney < 0) { setEndingId('bankrupt'); setIsTransitioning(false); setGameState('ending'); return; }
          }

          if (!vipQuest.active && !vipQuest.completed && fame >= 300) {
            setVipQuest(prev => ({ ...prev, active: true }));
            addLog(`👑【特命】王室から「エピック品質のミスリルブレードを献上せよ」との依頼が来た！`);
          }

          if (day >= 100) { checkEnding(nextMoney, newAdvs); setIsTransitioning(false); return; }

          setDay(d => d + 1);
          if (!targetBoss) setLogs(prev => [...prev, "=== REPORT_START ===", JSON.stringify(reportLogs)]); 
          
          triggerDailyEvent(); 
          
          setTransitionText(`Day ${day + 1} の朝...`);
          setTimeout(() => {
            setGameState('report');
            setIsTransitioning(false);
          }, 1000);

        }, 1500); 
      };

      const checkEnding = (finalMoney, advs) => {
        const aliveAdvs = advs.filter(a => !a.isDead);

              <p className="text-base md:text-xl leading-relaxed text-gray-300 mb-12 bg-white/5 p-6 rounded">{currentEnd.desc}</p>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6 text-center bg-[#3E2723] p-6 rounded-lg border border-[#D4AF37] shadow-2xl">
                <div><div className="text-sm text-gray-400 mb-2">最終資金</div><div className={`text-2xl font-bold ${money < 0 ? 'text-red-500' : 'text-[#D4AF37]'}`}>{money} G</div></div>
                <div><div className="text-sm text-gray-400 mb-2">最終名声</div><div className="text-2xl font-bold text-white">⭐ {fame}</div></div>
                <div><div className="text-sm text-gray-400 mb-2">生存冒険者数</div><div className="text-2xl font-bold text-white">{aliveCount} <span className="text-sm font-normal text-gray-400">/ {adventurers.length}</span></div></div>
              </div>
              <div className="mt-16 flex flex-col md:flex-row justify-center gap-6">
                <button onClick={resetGame} className={`font-bold px-8 py-3 rounded transition-all active:scale-95 text-lg ${confirmReset ? 'bg-red-600 text-white' : 'bg-[#D4AF37] text-[#3E2723] hover:bg-yellow-500'}`}>
                  {confirmReset ? '本当にリセット？' : '最初からやり直す'}
                </button>
                {hasSaveData && (
                  <button onClick={clearSave} className={`px-6 py-3 rounded transition-all active:scale-95 ${confirmClear ? 'bg-red-700 text-white border-red-700' : 'border border-red-900 text-red-400 hover:text-white'}`}>
                    {confirmClear ? '記録を完全に消去？' : '記録を消去'}
                  </button>
                )}
              </div>
            </div>
          </div>
        );
      };

      const renderAdventurerModal = () => {
        if (!selectedAdvInfo) return null;
        const a = selectedAdvInfo;
        const pwrInfo = calcTotalPowerInfo(a);
        const optWeight = CLASS_DATA[a.class].weight;

        return (
          <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4 fade-in" onClick={() => setSelectedAdvInfo(null)}>
            <div className="bg-[#F4EFE6] rounded-xl max-w-md w-full border-4 border-[#3E2723] text-[#2C3E50] shadow-2xl overflow-hidden pop-up" onClick={e => e.stopPropagation()}>
              <div className="bg-[#3E2723] text-[#D4AF37] p-4 flex justify-between items-center border-b-2 border-[#D4AF37]">
                <h2 className="text-2xl font-serif font-bold flex items-center gap-3">
                  <div className="w-10 h-10 bg-[#D4AF37] text-[#3E2723] rounded-full flex items-center justify-center shadow"><IconUser /></div>{a.name}
                </h2>
                <button onClick={() => setSelectedAdvInfo(null)} className="text-xl font-bold hover:text-white">&times;</button>
              </div>
              <div className="p-6">
                <div className="flex justify-between items-end mb-3">
                  <div><div className="text-sm text-gray-500 mb-1">Class</div><div className={`text-xl font-bold ${a.class !== a.baseClass ? 'text-yellow-600' : 'text-[#3E2723]'}`}>{a.class}</div></div>
                  <div className="text-right"><div className="text-sm text-gray-500 mb-1">Survival / Trust</div><div className="text-base font-bold">{a.aliveDays} Days / {a.trust}</div></div>
                </div>
                <p className="text-sm italic mb-6 bg-white p-4 rounded border shadow-inner leading-relaxed text-gray-700">"{a.flavor}"</p>
                <div className="bg-gray-100 p-4 rounded border mb-6">
                   <div className="flex justify-between items-center mb-2 pb-2 border-b border-gray-300">
                     <span className="font-bold text-[#3E2723]">総合戦闘力</span><span className="text-2xl font-bold text-indigo-700">{pwrInfo.total}</span>
                   </div>
                   <div className="flex justify-between text-sm text-gray-600 mb-1"><span>ベース能力</span><span>{a.basePower}</span></div>
                   <div className="flex justify-between text-sm text-gray-600 mb-1"><span>適正重量</span><span className="font-bold">{WEIGHT_LABELS[optWeight]}</span></div>
                   
                   <div className="mt-3 pt-3 border-t border-gray-300">
                     <div className="text-xs text-gray-500 mb-1">得意な装備カテゴリ:</div>
                     <div className="flex flex-wrap gap-1">
                       {CLASS_DATA[a.class].fav.map(favCat => (
                         <span key={favCat} className="text-[10px] bg-yellow-100 text-yellow-800 border border-yellow-300 px-1.5 py-0.5 rounded font-bold">
                           {CATEGORY_NAMES[favCat]}
                         </span>
                       ))}
                     </div>
                   </div>

                   {pwrInfo.bonusInfo.activeSeries && (
                     <div className="flex justify-between text-xs mt-3 text-indigo-600 font-bold bg-indigo-50 p-1.5 rounded">
                       <span>セットボーナス: {SERIES_NAMES[pwrInfo.bonusInfo.activeSeries]}</span><span>x{pwrInfo.bonusInfo.multiplier}</span>
                     </div>
                   )}
                </div>
                <div>
                  <h4 className="font-bold text-sm text-gray-500 mb-2">現在の装備</h4>
                  <div className="space-y-2">
                    {['weapon', 'armor', 'shield'].map(slot => {
                      const item = a.equips[slot];
                      const slotNames = { weapon: '武器', armor: '防具', shield: '盾/飾' };
                      return (
                        <div key={slot} className="flex items-center justify-between bg-white border p-2 rounded text-sm">
                          <span className="text-gray-400 w-12">{slotNames[slot]}</span>
                          {item ? (
                            <>
                              <span className="font-bold truncate flex-1 px-2">{item.name}</span>
                              <div className="flex flex-col items-end w-16 flex-shrink-0">
                                <span className="text-gray-600 font-bold">+{calcEquipPower(a.class, item).final}</span>
                                <span className={`text-[9px] ${item.durability <= 0 ? 'text-red-500' : 'text-gray-400'}`}>耐: {item.durability}/{item.maxDurability}</span>
                              </div>
                            </>
                          ) : ( <span className="text-gray-400 flex-1 px-2">-</span> )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="flex flex-col h-[100dvh] bg-[#F4EFE6] overflow-hidden">
          {toast.visible && (
            <div className={`fixed top-4 left-1/2 transform -translate-x-1/2 z-50 px-6 py-3 rounded shadow-lg text-white font-bold animate-toast ${toast.type === 'error' ? 'bg-red-600' : toast.type === 'success' ? 'bg-green-600' : 'bg-blue-600'}`}>
              {toast.message}
            </div>
          )}
          <DailyEventModal event={dailyEvent} onResolve={handleEventResolve} />
          {isTransitioning && (
            <div className="fixed inset-0 z-50 bg-black flex items-center justify-center fade-in">
              <div className="text-white text-4xl font-serif text-center">
                <div className="text-gray-400 mb-2 text-xl tracking-widest">{transitionText}</div>
              </div>
            </div>
          )}
          {renderHeader()}
          <div className="flex flex-1 overflow-hidden">
            {gameState !== 'report' && gameState !== 'ending' && renderSidebar()}
            <main className="flex-1 overflow-y-auto relative shadow-inner">
              {gameState === 'menu' && renderMainMenu()}
              {gameState === 'craft' && renderCraftingView()}
              {gameState === 'shop' && renderShopView()}
              {gameState === 'dealer' && renderDealerView()}
              {gameState === 'quest' && renderQuestView()}
              {gameState === 'upgrade' && renderUpgradeView()}
              {gameState === 'achievements' && renderAchievementsView()}
              {gameState === 'log' && renderLogView()}
              {gameState === 'report' && renderReportView()}
              {gameState === 'ending' && renderEndingView()}
            </main>
          </div>
          {renderAdventurerModal()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
